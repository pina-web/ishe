<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FAFBFC">
<title>아이스케줄</title>
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg:#FAFBFC; --card:#FFF; --line:#E6EBF0;
    --blue:#8FC7E8; --green:#A8D5A2;
    --navy:#2C3E50; --text:#33383D; --sub:#8A939C; --faint:#B8C0C8;
    --danger:#E88F8F; --sun:#E8929B; --sat:#7FA8D4;
    --shadow:0 1px 3px rgba(44,62,80,.05), 0 4px 16px rgba(44,62,80,.04);
  }
  body { font-family:'Pretendard Variable',Pretendard,-apple-system,system-ui,sans-serif;
    background:var(--bg); color:var(--text); -webkit-font-smoothing:antialiased; }
  .wrap { max-width:1180px; margin:0 auto; padding:0 20px 60px; }

  header { padding:30px 0 18px; }
  h1 { font-size:25px; font-weight:800; letter-spacing:-.6px; color:var(--navy); }
  .sub { font-size:13px; color:var(--sub); margin-top:4px; font-weight:500; }
  .accent-bar { height:4px; border-radius:2px; background:linear-gradient(90deg,var(--blue),var(--green)); margin-top:14px; }

  .layout { display:grid; grid-template-columns:1fr 340px; gap:18px; align-items:start; }

  /* ── Calendar ── */
  .cal { background:var(--card); border:1px solid var(--line); border-radius:16px;
    padding:18px; box-shadow:var(--shadow); }
  .cal-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:16px; }
  .cal-title { font-size:19px; font-weight:800; color:var(--navy); letter-spacing:-.4px; }
  .cal-title span { font-size:14px; color:var(--sub); font-weight:600; margin-left:5px; }
  .nav { display:flex; gap:5px; align-items:center; }
  .nb { width:32px; height:32px; border:1px solid var(--line); background:#fff; border-radius:8px;
    cursor:pointer; color:var(--sub); display:flex; align-items:center; justify-content:center; transition:.15s; }
  .nb:hover { border-color:var(--blue); color:var(--blue); background:#FBFDFE; }
  .nb svg { width:14px; height:14px; }
  .today-b { padding:0 12px; height:32px; border:1px solid var(--line); background:#fff;
    border-radius:8px; cursor:pointer; font-family:inherit; font-size:12.5px;
    font-weight:700; color:var(--sub); transition:.15s; }
  .today-b:hover { border-color:var(--blue); color:var(--blue); }

  .dow { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:6px; }
  .dow div { text-align:center; font-size:11.5px; font-weight:700; color:var(--sub); padding:6px 0; }
  .dow div:first-child { color:var(--sun); }
  .dow div:last-child { color:var(--sat); }

  .grid { display:grid; grid-template-columns:repeat(7,1fr); gap:4px; }
  .cell { min-height:88px; border:1px solid transparent; border-radius:9px; padding:6px 5px;
    cursor:pointer; transition:.13s; background:#FCFDFE; display:flex; flex-direction:column; gap:3px; }
  .cell:hover { background:#F4F9FC; border-color:#D8E7F1; }
  .cell.out { background:transparent; }
  .cell.out .dn { color:#DDE3E9; }
  .cell.out:hover { background:#FAFBFC; }
  .cell.sel { background:#EDF6FB; border-color:var(--blue); box-shadow:0 0 0 2px rgba(143,199,232,.2); }
  .cell.today .dn { background:var(--navy); color:#fff; }
  .dn { font-size:12.5px; font-weight:700; color:var(--text); width:21px; height:21px;
    display:flex; align-items:center; justify-content:center; border-radius:6px; flex-shrink:0; }
  .cell.sun .dn { color:var(--sun); }
  .cell.sat .dn { color:var(--sat); }
  .cell.today.sun .dn, .cell.today.sat .dn { color:#fff; }
  .chips { display:flex; flex-direction:column; gap:2px; overflow:hidden; }
  .chip { font-size:10.5px; font-weight:600; padding:2px 5px; border-radius:4px;
    background:rgba(143,199,232,.22); color:#3D7A9E; white-space:nowrap;
    overflow:hidden; text-overflow:ellipsis; line-height:1.45; }
  .chip.done { background:#F0F3F6; color:var(--faint); text-decoration:line-through; }
  .more { font-size:9.5px; font-weight:700; color:var(--faint); padding-left:5px; }

  /* ── Side panel ── */
  .side { background:var(--card); border:1px solid var(--line); border-radius:16px;
    box-shadow:var(--shadow); overflow:hidden; position:sticky; top:20px; }
  .stabs { display:flex; border-bottom:1px solid var(--line); }
  .stab { flex:1; padding:12px 0; border:none; background:#FAFBFC; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:700; color:var(--sub); transition:.15s;
    border-bottom:2px solid transparent; }
  .stab.on { background:#fff; color:var(--navy); border-bottom-color:var(--blue); }
  .sbody { padding:16px; max-height:620px; overflow-y:auto; }

  .shead { display:flex; align-items:baseline; gap:7px; margin-bottom:12px; }
  .shead .sd { font-size:16px; font-weight:800; color:var(--navy); letter-spacing:-.3px; }
  .shead .sc { font-size:11.5px; font-weight:700; color:var(--blue); }

  .add { width:100%; padding:11px; border:1.5px dashed #D3DBE3; background:#fff;
    border-radius:10px; cursor:pointer; font-family:inherit; font-size:13px;
    font-weight:700; color:var(--sub); transition:.15s; margin-bottom:12px; }
  .add:hover { border-color:var(--blue); color:var(--blue); background:#FBFDFE; }

  .form { border:1px solid var(--line); border-radius:11px; padding:14px;
    margin-bottom:12px; background:#FCFDFE; display:none; }
  .form.on { display:block; animation:pop .2s ease; }
  @keyframes pop { from{opacity:0;transform:translateY(-5px)} to{opacity:1;transform:none} }
  .fg { margin-bottom:10px; }
  label { display:block; font-size:11px; font-weight:700; color:var(--sub); margin-bottom:5px; }
  input, textarea { width:100%; padding:9px 11px; border:1.5px solid var(--line);
    border-radius:8px; font-family:inherit; font-size:13.5px; color:var(--text); background:#fff; transition:.15s; }
  input:focus, textarea:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(143,199,232,.15); }
  textarea { resize:vertical; min-height:52px; line-height:1.5; }
  .btns { display:flex; gap:6px; margin-top:12px; }
  .btn { flex:1; padding:10px; border:none; border-radius:8px; cursor:pointer;
    font-family:inherit; font-size:13px; font-weight:700; transition:.15s; }
  .btn-p { background:var(--navy); color:#fff; }
  .btn-p:hover { background:#3D5166; }
  .btn-s { background:#F1F4F7; color:var(--sub); }
  .btn-s:hover { background:#E8EDF2; }

  .item { border:1px solid var(--line); border-left:3px solid var(--blue); border-radius:10px;
    padding:11px 12px; margin-bottom:7px; display:flex; gap:9px; align-items:flex-start;
    background:#fff; transition:.15s; }
  .item:hover { border-color:#D5DEE6; }
  .item.done { opacity:.5; border-left-color:var(--green); }
  .item.done .it { text-decoration:line-through; color:var(--sub); }
  .item.past { border-left-color:var(--faint); }
  .chk { flex-shrink:0; width:18px; height:18px; border:2px solid #D3DBE3; border-radius:5px;
    cursor:pointer; margin-top:1px; transition:.15s; display:flex; align-items:center;
    justify-content:center; background:#fff; }
  .chk:hover { border-color:var(--green); }
  .chk.on { background:var(--green); border-color:var(--green); }
  .chk.on::after { content:''; width:4px; height:8px; border:solid #fff;
    border-width:0 2px 2px 0; transform:rotate(45deg) translateY(-1px); }
  .ib { flex:1; min-width:0; }
  .it { font-size:13.5px; font-weight:700; letter-spacing:-.2px; line-height:1.4; word-break:break-word; }
  .im { display:flex; gap:6px; align-items:center; margin-top:4px; flex-wrap:wrap; }
  .tm { font-size:11.5px; font-weight:700; color:#4A90B8; background:rgba(143,199,232,.14);
    padding:1.5px 6px; border-radius:4px; }
  .item.past .tm, .item.done .tm { color:var(--sub); background:#F1F4F7; }
  .un { font-size:10.5px; color:var(--faint); font-weight:600; }
  .mm { font-size:11.5px; color:var(--sub); margin-top:5px; line-height:1.55;
    white-space:pre-wrap; word-break:break-word; }
  .acts { display:flex; gap:1px; flex-shrink:0; }
  .ico { width:24px; height:24px; border:none; background:transparent; cursor:pointer;
    border-radius:6px; color:var(--faint); transition:.15s; display:flex;
    align-items:center; justify-content:center; }
  .ico:hover { background:#F1F4F7; color:var(--sub); }
  .ico.del:hover { background:rgba(232,143,143,.12); color:var(--danger); }
  .ico svg { width:12px; height:12px; }

  .dg { margin-bottom:16px; }
  .dgh { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
  .dgh .l { font-size:12px; font-weight:800; color:var(--navy); }
  .dgh .bd { font-size:9.5px; font-weight:800; padding:2px 6px; border-radius:4px;
    background:rgba(143,199,232,.2); color:#4A90B8; }
  .dgh .bd.g { background:rgba(168,213,162,.24); color:#5F9556; }
  .dgh .ln { flex:1; height:1px; background:var(--line); }

  .empty { text-align:center; padding:40px 16px; }
  .empty .em { font-size:28px; margin-bottom:9px; opacity:.4; }
  .empty .et { font-size:13px; color:var(--sub); font-weight:600; }
  .empty .es { font-size:11.5px; color:var(--faint); margin-top:4px; }

  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
    background:var(--navy); color:#fff; padding:10px 18px; border-radius:9px;
    font-size:13px; font-weight:600; box-shadow:0 6px 22px rgba(44,62,80,.25);
    transition:transform .26s cubic-bezier(.2,.9,.3,1.2); z-index:99; }
  .toast.on { transform:translateX(-50%) translateY(0); }

  @media (max-width:900px) {
    .layout { grid-template-columns:1fr; }
    .side { position:static; }
    .cell { min-height:64px; }
    .chip { font-size:0; padding:0; height:4px; border-radius:2px; margin-bottom:1px; }
    .chip.done { background:#E4E9EE; }
    .more { display:none; }
    .sbody { max-height:none; }
  }
  @media (max-width:520px) {
    .wrap { padding:0 12px 40px; }
    .cal { padding:12px; }
    .grid { gap:2px; }
    .cell { min-height:54px; padding:4px 3px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>아이스케줄</h1>
    <div class="sub">달력에서 날짜를 눌러 일정을 확인하고 추가하세요</div>
    <div class="accent-bar"></div>
  </header>

  <div class="layout">
    <div class="cal">
      <div class="cal-top">
        <div class="cal-title" id="ctitle"></div>
        <div class="nav">
          <button class="nb" id="prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
          <button class="today-b" id="tbtn">오늘</button>
          <button class="nb" id="next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
        </div>
      </div>
      <div class="dow"><div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div></div>
      <div class="grid" id="grid"></div>
    </div>

    <div class="side">
      <div class="stabs">
        <button class="stab on" data-t="day">선택한 날</button>
        <button class="stab" data-t="all">전체 일정</button>
      </div>
      <div class="sbody" id="sbody"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const KEY='ischedule.v2';
let data=[], cur=new Date(), sel=null, stab='day', formOpen=false, editId=null;

function load(){ try{ data=JSON.parse(localStorage.getItem(KEY))||[] }catch(e){ data=[] } }
function persist(){ try{ localStorage.setItem(KEY,JSON.stringify(data)) }catch(e){ toast('저장 실패') } }

const $=id=>document.getElementById(id);
const pad=n=>String(n).padStart(2,'0');
const ymd=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const DAYS=['일','월','화','수','목','금','토'];
const esc=s=>{const d=document.createElement('div');d.textContent=s;return d.innerHTML};

function toast(m){ const t=$('toast'); t.textContent=m; t.classList.add('on');
  clearTimeout(t._x); t._x=setTimeout(()=>t.classList.remove('on'),2000); }

function until(iso){
  const df=new Date(iso)-new Date();
  if(df<0) return '지남';
  const mn=Math.floor(df/60000);
  if(mn<1) return '곧 시작';
  if(mn<60) return `${mn}분 후`;
  const h=Math.floor(mn/60);
  if(h<24) return `${h}시간 ${mn%60}분 후`;
  return `${Math.floor(h/24)}일 후`;
}

const byDate=d=>data.filter(e=>e.date===d).sort((a,b)=>a.time<b.time?-1:1);

const ICO_E='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/></svg>';
const ICO_D='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2m3 0v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M10 11v6M14 11v6"/></svg>';

/* ── Calendar ── */
function renderCal(){
  const y=cur.getFullYear(), m=cur.getMonth();
  $('ctitle').innerHTML=`${y}년 ${m+1}월<span>${DAYS[new Date().getDay()]}요일 기준</span>`;
  const first=new Date(y,m,1), start=new Date(first);
  start.setDate(1-first.getDay());
  const today=ymd(new Date());
  let h='';
  for(let i=0;i<42;i++){
    const d=new Date(start); d.setDate(start.getDate()+i);
    const k=ymd(d), out=d.getMonth()!==m, dw=d.getDay();
    const evs=byDate(k);
    const cls=['cell', out?'out':'', k===today?'today':'', k===sel?'sel':'',
               dw===0?'sun':'', dw===6?'sat':''].filter(Boolean).join(' ');
    const shown=evs.slice(0,3).map(e=>`<div class="chip ${e.done?'done':''}">${esc(e.title)}</div>`).join('');
    const more=evs.length>3?`<div class="more">+${evs.length-3}</div>`:'';
    h+=`<div class="${cls}" data-k="${k}"><div class="dn">${d.getDate()}</div>
        <div class="chips">${shown}${more}</div></div>`;
  }
  $('grid').innerHTML=h;
}

/* ── Side ── */
function itemHTML(e,showDate){
  const iso=`${e.date}T${e.time}`, past=new Date(iso)<new Date() && !e.done;
  return `<div class="item ${e.done?'done':''} ${past?'past':''}">
    <div class="chk ${e.done?'on':''}" data-c="${e.id}"></div>
    <div class="ib">
      <div class="it">${esc(e.title)}</div>
      <div class="im"><span class="tm">${e.time}</span>${!e.done?`<span class="un">${until(iso)}</span>`:''}</div>
      ${e.memo?`<div class="mm">${esc(e.memo)}</div>`:''}
    </div>
    <div class="acts">
      <button class="ico" data-e="${e.id}">${ICO_E}</button>
      <button class="ico del" data-d="${e.id}">${ICO_D}</button>
    </div>
  </div>`;
}

function formHTML(){
  const e=editId?data.find(x=>x.id===editId):null;
  return `<div class="form ${formOpen?'on':''}" id="form">
    <div class="fg"><label>일정 제목</label>
      <input type="text" id="f-t" value="${e?esc(e.title):''}" placeholder="예: 아르떼 T5 시제품 미팅" autocomplete="off"></div>
    <div class="fg"><label>날짜</label><input type="date" id="f-d" value="${e?e.date:(sel||ymd(new Date()))}"></div>
    <div class="fg"><label>시간</label><input type="time" id="f-tm" value="${e?e.time:'09:00'}"></div>
    <div class="fg"><label>메모 <span style="font-weight:500;color:var(--faint)">(선택)</span></label>
      <textarea id="f-m" placeholder="장소, 준비물, 참석자 등">${e?esc(e.memo||''):''}</textarea></div>
    <div class="btns"><button class="btn btn-s" id="cancel">취소</button>
      <button class="btn btn-p" id="save">${e?'수정':'저장'}</button></div>
  </div>`;
}

function renderSide(){
  const box=$('sbody');
  if(stab==='day'){
    const k=sel||ymd(new Date());
    const [y,m,d]=k.split('-').map(Number);
    const dt=new Date(y,m-1,d);
    const evs=byDate(k);
    let h=`<div class="shead"><span class="sd">${m}월 ${d}일 (${DAYS[dt.getDay()]})</span>`;
    if(evs.length) h+=`<span class="sc">${evs.length}건</span>`;
    h+=`</div>`;
    h+=formOpen?formHTML():`<button class="add" id="addb">+ 이 날짜에 일정 추가</button>`;
    h+=evs.length ? evs.map(e=>itemHTML(e)).join('')
      : `<div class="empty"><div class="em">🗓️</div><div class="et">일정이 없습니다</div>
         <div class="es">위 버튼으로 추가하세요</div></div>`;
    box.innerHTML=h;
  }else{
    const up=data.filter(e=>!e.done).sort((a,b)=>(a.date+a.time)<(b.date+b.time)?-1:1);
    const dn=data.filter(e=>e.done).sort((a,b)=>(a.date+a.time)>(b.date+b.time)?-1:1);
    let h=`<div class="shead"><span class="sd">전체 일정</span><span class="sc">${up.length}건 예정</span></div>`;
    h+=formOpen?formHTML():`<button class="add" id="addb">+ 새 일정 추가</button>`;
    if(!up.length && !dn.length){
      h+=`<div class="empty"><div class="em">📋</div><div class="et">등록된 일정이 없습니다</div>
          <div class="es">달력에서 날짜를 눌러보세요</div></div>`;
    }else{
      const g={}; up.forEach(e=>{(g[e.date]=g[e.date]||[]).push(e)});
      const t0=new Date(); t0.setHours(0,0,0,0);
      h+=Object.keys(g).map(k=>{
        const [y,m,d]=k.split('-').map(Number);
        const dt=new Date(y,m-1,d), df=Math.round((dt-t0)/86400000);
        const bd=df===0?'<span class="bd">오늘</span>':df===1?'<span class="bd g">내일</span>':'';
        return `<div class="dg"><div class="dgh"><span class="l">${m}월 ${d}일 (${DAYS[dt.getDay()]})</span>
                ${bd}<span class="ln"></span></div>${g[k].map(e=>itemHTML(e)).join('')}</div>`;
      }).join('');
      if(dn.length) h+=`<div class="dg"><div class="dgh"><span class="l">완료 ${dn.length}건</span>
        <span class="ln"></span></div>${dn.map(e=>itemHTML(e)).join('')}</div>`;
    }
    box.innerHTML=h;
  }
}

function render(){ renderCal(); renderSide(); }

/* ── Events ── */
$('grid').onclick=ev=>{
  const c=ev.target.closest('[data-k]'); if(!c) return;
  sel=c.dataset.k; stab='day'; formOpen=false; editId=null;
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.dataset.t==='day'));
  render();
};

$('sbody').onclick=ev=>{
  if(ev.target.closest('#addb')){ formOpen=true; editId=null; renderSide(); $('f-t').focus(); return; }
  if(ev.target.closest('#cancel')){ formOpen=false; editId=null; renderSide(); return; }
  if(ev.target.closest('#save')){
    const t=$('f-t').value.trim(), d=$('f-d').value, tm=$('f-tm').value;
    if(!t){ toast('제목을 입력하세요'); $('f-t').focus(); return; }
    if(!d||!tm){ toast('날짜와 시간을 입력하세요'); return; }
    const memo=$('f-m').value.trim();
    if(editId){ Object.assign(data.find(x=>x.id===editId),{title:t,date:d,time:tm,memo}); toast('수정되었습니다'); }
    else{ data.push({id:Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          title:t,date:d,time:tm,memo,done:false}); toast('일정이 추가되었습니다'); }
    sel=d; formOpen=false; editId=null; persist(); render(); return;
  }
  const c=ev.target.closest('[data-c]');
  if(c){ const e=data.find(x=>x.id===c.dataset.c); e.done=!e.done; persist(); render();
         toast(e.done?'완료 처리했습니다':'완료를 해제했습니다'); return; }
  const e2=ev.target.closest('[data-e]');
  if(e2){ editId=e2.dataset.e; formOpen=true; renderSide(); $('f-t').focus(); return; }
  const dl=ev.target.closest('[data-d]');
  if(dl){ if(confirm('이 일정을 삭제할까요?')){ data=data.filter(x=>x.id!==dl.dataset.d);
          persist(); render(); toast('삭제되었습니다'); } }
};

document.querySelectorAll('.stab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.stab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on'); stab=b.dataset.t; formOpen=false; editId=null; renderSide();
});

$('prev').onclick=()=>{ cur.setDate(1); cur.setMonth(cur.getMonth()-1); renderCal(); };
$('next').onclick=()=>{ cur.setDate(1); cur.setMonth(cur.getMonth()+1); renderCal(); };
$('tbtn').onclick=()=>{ cur=new Date(); sel=ymd(new Date()); stab='day'; formOpen=false;
  document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.dataset.t==='day')); render(); };

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&e.target.id==='f-t') $('save').click();
  if(e.key==='Escape'&&formOpen){ formOpen=false; editId=null; renderSide(); }
});

load(); sel=ymd(new Date()); render();
setInterval(()=>{ if(!formOpen) renderSide(); }, 60000);
</script>
</body>
</html>
